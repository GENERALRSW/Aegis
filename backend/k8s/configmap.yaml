apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  APP_NAME: "AEGIS Surveillance Backend"
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  DEBUG: "false"
  MONGO_DB: "aegis_db"
  BROKER: "kafka"
  KAFKA_TOPIC_DETECTIONS: "detections"
  KAFKA_TOPIC_ALERTS: "alerts"
  GEMINI_MODEL: "gemini-1.5-flash"
  LLM_ENABLED: "true"
  YOLO_MODEL_PATH: "models/yolov8n.pt"
  WEAPON_MODEL_PATH: "models/weapon_yolov8.pt"
  CONFIDENCE_THRESHOLD: "0.45"
  IOU_THRESHOLD: "0.45"
  DEVICE: "cpu"
  LOG_LEVEL: "INFO"
  LOG_FILE: "logs/aegis.log"
  RATE_LIMIT_PER_MINUTE: "120"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"

---
# NOTE: Replace placeholder values with real secrets
# Use: kubectl create secret generic aegis-secrets --from-env-file=.env -n aegis
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegis
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  MONGO_URI: "mongodb://mongo-service:27017"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  GEMINI_API_KEY: "REPLACE_WITH_GEMINI_KEY"
  FCM_PROJECT_ID: "REPLACE_WITH_FCM_PROJECT_ID"
  ALLOWED_ORIGINS: "https://your-dashboard.com"
