# ─────────────────────────────────────────────────────────────────────────────
#  AEGIS — Kubernetes Deployment + Service + HPA
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-backend
  namespace: aegis
  labels:
    app: aegis-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aegis-backend
    spec:
      serviceAccountName: aegis-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: aegis-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: aegis-secrets
            - configMapRef:
                name: aegis-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: firebase-creds
              mountPath: /app/firebase_credentials.json
              subPath: firebase_credentials.json
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: aegis-models-pvc
        - name: logs
          emptyDir: {}
        - name: firebase-creds
          secret:
            secretName: firebase-credentials

---
apiVersion: v1
kind: Service
metadata:
  name: aegis-backend-svc
  namespace: aegis
spec:
  selector:
    app: aegis-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-backend-hpa
  namespace: aegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-sa
  namespace: aegis
